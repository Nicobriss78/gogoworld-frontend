<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GoGoWorld.life – Homepage 0</title>

  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#1F4E5F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="GoGoWorld" />

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="/css/areas/public.css" />
  <meta name="robots" content="noindex" />
</head>

<body>
  <main class="container home0">
    <header class="app-header">
      <h1 class="app-title">GoGoWorld.life</h1>
      <p class="subtitle">Scegli come entrare</p>
      <div id="installBanner" class="gw-install-banner is-hidden" aria-live="polite">
  <div class="gw-install-banner__media" aria-hidden="true">
    <img src="/icons/icon-192.png" alt="" class="gw-install-banner__icon">
  </div>

  <div class="gw-install-banner__body">
    <div class="gw-install-banner__eyebrow">Esperienza app</div>
    <div class="gw-install-banner__title">Installa GoGoWorld</div>
    <p class="gw-install-banner__text">
      Accesso più rapido, apertura senza browser e esperienza più pulita sul telefono.
    </p>

    <div class="gw-install-banner__actions">
      <button id="installBtn" class="btn gw-install-banner__cta" type="button">
        Installa app
      </button>
      <button id="installDismissBtn" class="gw-install-banner__dismiss" type="button" aria-label="Chiudi banner installazione">
        ×
      </button>
    </div>
  </div>
      </div>
    </header>
    
    <section class="role-grid">
      <button id="btnOrganizer" class="btn role-btn left">Sono un Organizzatore</button>
      <button id="btnParticipant" class="btn role-btn right">Sono un Partecipante</button>
    </section>

    <section class="register-cta">
      <button id="btnRegister" class="btn btn-secondary">Registrati</button>
    </section>

    <footer class="app-footer">
      <small>© GoGoWorld.life</small>
    </footer>
  </main>

  <!-- modulo (coerente anche se index.js non importa) -->
  <script type="module" src="js/index.js"></script>
  <script>
    // Listener globale per retry API (503/502/504)
    window.addEventListener("api:status", (e) => {
      const { phase, attempt, status } = e.detail || {};
      if (phase === "retry") {
        try {
          showAlert(`⏳ Server in riattivazione… (tentativo ${attempt})`, "info", { autoHideMs: 1500 });
        } catch {
          console.info("Server in riattivazione… tentativo", attempt, "status", status);
        }
      }
    });

  </script>
</body>
</html>
