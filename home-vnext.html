<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home • GoGoWorld.life</title>

  <!-- BASE MINIMA -->
  <link rel="stylesheet" href="/css/tokens.v2.css" />
  <link rel="stylesheet" href="/css/icons-v2.css" />
  <!-- SOLO SE ESISTE ED È NEUTRO -->
  <!-- <link rel="stylesheet" href="/css/base.css" /> -->

  <!-- CSS DEDICATO HOME -->
  <link rel="stylesheet" href="/css/areas/home.css" />
</head>

<body class="home-page">
 <div aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden">
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
      <symbol id="gw-icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="6"></circle>
        <path d="M20 20l-4.2-4.2"></path>
      </symbol>

      <symbol id="gw-icon-pin" viewBox="0 0 24 24">
        <path d="M12 21s-5-4.6-5-9a5 5 0 1 1 10 0c0 4.4-5 9-5 9z"></path>
        <circle cx="12" cy="12" r="1.8"></circle>
      </symbol>

      <symbol id="gw-icon-chat" viewBox="0 0 24 24">
        <path d="M6 17l-2 3v-4a7 7 0 1 1 2 1z"></path>
      </symbol>

      <symbol id="gw-icon-bell" viewBox="0 0 24 24">
        <path d="M15 18H9"></path>
        <path d="M18 16H6c1.1-1.1 2-2.8 2-5V9a4 4 0 1 1 8 0v2c0 2.2.9 3.9 2 5z"></path>
      </symbol>

      <symbol id="gw-icon-menu" viewBox="0 0 24 24">
        <path d="M4 7h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 17h16"></path>
      </symbol>

      <symbol id="gw-icon-map" viewBox="0 0 24 24">
        <path d="M3 6l6-2 6 2 6-2v14l-6 2-6-2-6 2V6z"></path>
        <path d="M9 4v14"></path>
        <path d="M15 6v14"></path>
      </symbol>

      <symbol id="gw-icon-calendar" viewBox="0 0 24 24">
        <rect x="3" y="5" width="18" height="16" rx="2"></rect>
        <path d="M16 3v4"></path>
        <path d="M8 3v4"></path>
        <path d="M3 10h18"></path>
      </symbol>

      <symbol id="gw-icon-home" viewBox="0 0 24 24">
        <path d="M4 10.5L12 4l8 6.5"></path>
        <path d="M6 9.5V20h12V9.5"></path>
      </symbol>

      <symbol id="gw-icon-users" viewBox="0 0 24 24">
        <circle cx="9" cy="9" r="3"></circle>
        <circle cx="17" cy="10" r="2.5"></circle>
        <path d="M4.5 19a4.5 4.5 0 0 1 9 0"></path>
        <path d="M14.5 18a3.5 3.5 0 0 1 5 0"></path>
      </symbol>

      <symbol id="gw-icon-profile" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="3.5"></circle>
        <path d="M5 20a7 7 0 0 1 14 0"></path>
      </symbol>
    </svg>
  </div> 
  <!-- =========================
       TOPBAR (MINIMA AUTONOMA)
       ========================= -->
<header class="home-topbar">
    <div class="home-topbar__row home-topbar__row--identity">
      <div class="home-topbar__identity">
        <div class="home-topbar__greeting">Ciao partecipante12</div>
        <div class="home-topbar__role">Esploratore</div>
      </div>

      <div class="home-topbar__brand">GoGoWorld.life</div>
    </div>

    <div class="home-topbar__row home-topbar__row--actions">
      <button class="home-topbar__btn gw-iconbtn" aria-label="Cerca" title="Cerca">
        <svg class="gw-icon" aria-hidden="true">
          <use href="#gw-icon-search"></use>
        </svg>
      </button>

      <button class="home-topbar__btn gw-iconbtn" aria-label="Mappa" title="Mappa">
        <svg class="gw-icon" aria-hidden="true">
          <use href="#gw-icon-pin"></use>
        </svg>
      </button>

      <button class="home-topbar__btn gw-iconbtn" aria-label="Messaggi" title="Messaggi">
        <svg class="gw-icon" aria-hidden="true">
          <use href="#gw-icon-chat"></use>
        </svg>
      </button>

      <button class="home-topbar__btn gw-iconbtn" aria-label="Notifiche" title="Notifiche">
        <svg class="gw-icon" aria-hidden="true">
          <use href="#gw-icon-bell"></use>
        </svg>
      </button>

      <button class="home-topbar__btn gw-iconbtn" aria-label="Menu" title="Menu">
        <svg class="gw-icon" aria-hidden="true">
          <use href="#gw-icon-menu"></use>
        </svg>
      </button>
    </div>
  </header>

  <!-- =========================
       HOME ROOT
       ========================= -->
  <main>
    <!-- INCOLLA QUI IL TUO HTML HOME (senza topbar/nav/footer) -->
    
    <section class="home" id="homeRoot" aria-label="Home partecipante">
      <div class="home-viewport" id="homeViewport">

        <!-- =========================
             BLOCCO 1 — GENERALE
             ========================= -->
<section class="home-section">
          <header class="home-section-head">
            <div class="home-section-head__text">
              <h2 class="home-section-title">Eventi per te</h2>
              <p class="home-section-subtitle">Eventi disponibili e più vicini a te</p>
            </div>
            <div class="home-section-head__hint" aria-hidden="true">
              <span class="home-scroll-hint">Scorri</span>
            </div>
          </header>

          <div class="home-rail-shell" id="homeRailShellGeneral" data-rail-mode="active">
            <div class="home-rail home-rail--active" id="homeRailGeneralActive"></div>
            <div class="home-rail home-rail--past" id="homeRailGeneralPast"></div>

            <div class="home-scrollbar" id="homeScrollbarGeneralActive">
              <div class="home-scrollbar-thumb"></div>
            </div>

            <div class="home-scrollbar" id="homeScrollbarGeneralPast">
              <div class="home-scrollbar-thumb"></div>
            </div>

          </div>
        </section>

        <!-- =========================
             BLOCCO 2 — PARTECIPAZIONI
             ========================= -->
        <section class="home-section">
<header class="home-section-head">
  <div class="home-section-head__text">
    <h2 class="home-section-title">I tuoi eventi</h2>
    <p class="home-section-subtitle">I tuoi eventi attivi e il tuo archivio recente</p>
  </div>
  <div class="home-section-head__hint" aria-hidden="true">
    <span class="home-scroll-hint">Scorri</span>
  </div>
</header>

          <div class="home-rail-shell" id="homeRailShellJoined" data-rail-mode="active">

            <div class="home-rail home-rail--active" id="homeRailJoinedActive"></div>
            <div class="home-rail home-rail--past" id="homeRailJoinedPast"></div>

            <div class="home-scrollbar" id="homeScrollbarJoinedActive">
              <div class="home-scrollbar-thumb"></div>
            </div>

            <div class="home-scrollbar" id="homeScrollbarJoinedPast">
              <div class="home-scrollbar-thumb"></div>
            </div>

          </div>
        </section>

      </div>
    </section>

  </main>

  <!-- =========================
       BOTTOM NAV (MINIMA)
       ========================= -->
<nav class="home-bottomnav" aria-label="Navigazione principale">
    <button class="gw-iconbtn" aria-label="Mappa" title="Mappa">
      <svg class="gw-icon" aria-hidden="true">
        <use href="#gw-icon-map"></use>
      </svg>
    </button>

    <button class="gw-iconbtn" aria-label="Eventi seguiti" title="Eventi seguiti">
      <svg class="gw-icon" aria-hidden="true">
        <use href="#gw-icon-calendar"></use>
      </svg>
    </button>

    <button class="gw-iconbtn is-active active" aria-label="Home" title="Home">
      <svg class="gw-icon" aria-hidden="true">
        <use href="#gw-icon-home"></use>
      </svg>
    </button>

    <button class="gw-iconbtn" aria-label="Utenti seguiti" title="Utenti seguiti">
      <svg class="gw-icon" aria-hidden="true">
        <use href="#gw-icon-users"></use>
      </svg>
    </button>

    <button class="gw-iconbtn" aria-label="Profilo" title="Profilo">
      <svg class="gw-icon" aria-hidden="true">
        <use href="#gw-icon-profile"></use>
      </svg>
    </button>
  </nav>

  <!-- =========================
       FOOTER
       ========================= -->
  <footer class="home-footer">
    <span>© GoGoWorld.life</span>
  </footer>

  <!-- =========================
       INIT HOME
       ========================= -->
  <script type="module">
    import { initHome } from "/js/home/home-controller.js";

    window.addEventListener("DOMContentLoaded", () => {
      initHome(document);
    });
  </script>

</body>
</html>
