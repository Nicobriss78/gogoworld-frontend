<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Evento – GoGoWorld</title>

  <!-- Tokens e stili V2 -->
  <link rel="stylesheet" href="/css/tokens.v2.css" />
  <link rel="stylesheet" href="/css/icons-v2.css" />
  <link rel="stylesheet" href="/css/areas/rooms.css" />
</head>
<body class="rooms-page">

  <!-- Header locale -->
  <header class="rooms-header">
    <button id="roomsBackBtn" class="rooms-back-btn">
      ← Torna
    </button>
    <h1 class="rooms-title" id="roomsTitle">Chat Evento</h1>
    <a id="roomsEventLink" class="rooms-event-link" href="#">
      Vai all’evento
    </a>
  </header>

  <!-- Layout principale -->
  <main class="rooms-layout">
    <!-- Sidebar stanze -->
    <aside class="rooms-sidebar">
      <h2 class="rooms-sidebar-title">Le mie stanze</h2>
      <ul id="roomsList" class="rooms-list"></ul>
    </aside>

    <!-- Area messaggi -->
    <section class="rooms-chat">
      <div id="roomsMessages" class="rooms-messages"></div>

      <!-- Composer -->
      <form id="roomsComposer" class="rooms-composer">
        <input
          type="text"
          id="roomsInput"
          placeholder="Scrivi un messaggio..."
          autocomplete="off"
          required
        />
        <button type="submit">Invia</button>
      </form>
    </section>
  </main>

  <!-- Script principale -->
  <script type="module" src="/js/rooms/rooms-controller.js"></script>
</body>
</html>
