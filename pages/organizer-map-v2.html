<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Organizer Map V2</title>

  <link rel="stylesheet" href="/css/tokens.v2.css" />
  <link rel="stylesheet" href="/css/icons-v2.css" />
  <link rel="stylesheet" href="/css/shared-shell.css" />
  <link rel="stylesheet" href="/css/shared-notifications.css" />
  <link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin=""
/>
  <link rel="stylesheet" href="/css/organizer-shell.css" />
  <link rel="stylesheet" href="/css/areas/organizer-map.css" />
</head>

<body class="organizer-shell" data-organizer-view="map">
  <header id="organizer-topbar"></header>

  <main id="organizer-view">
    <section class="org-map-page" data-org-map-root>
      <section class="org-map-hero">
        <div>
          <p class="org-map-eyebrow">Radar territoriale</p>
          <h1>Mappa Organizer</h1>
          <p>
            Cruscotto operativo con dati aggregati protetti per monitorare eventi,
presenze, trilli, promozioni e criticità territoriali.
          </p>
        </div>
      </section>

      <section class="org-map-state" data-org-map-loading>
        Caricamento intelligence territoriale...
      </section>

      <section class="org-map-error" data-org-map-error hidden>
        Non riesco a caricare la Mappa Organizer.
      </section>

      <section data-org-map-content hidden></section>
    </section>
  </main>

  <nav id="organizer-bottomnav"></nav>
  <div id="organizer-menu"></div>
 <script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script> 
  <script type="module" src="/js/organizer-shell/organizer-bootstrap.js?v=10"></script>
  <script type="module" src="/js/organizer-map/organizer-map-controller.js?v=1"></script>
</body>
</html>
