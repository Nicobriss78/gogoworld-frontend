<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Dettaglio promozione Organizer V2</title>

  <link rel="stylesheet" href="/css/tokens.v2.css" />
  <link rel="stylesheet" href="/css/icons-v2.css" />
  <link rel="stylesheet" href="/css/shared-shell.css" />
  <link rel="stylesheet" href="/css/shared-notifications.css" />

  <link rel="stylesheet" href="/css/organizer-shell.css" />
  <link rel="stylesheet" href="/css/areas/organizer-promo-detail.css" />
</head>

<body class="organizer-shell" data-organizer-view="promos">
  <header id="organizer-topbar"></header>

<main id="organizer-view">
  <section class="org-promo-detail-page" data-promo-detail-root>
    <header class="org-promo-detail-header">
      <a class="org-promo-detail-back" href="/pages/organizer-promos-v2.html">
        ← Promozioni
      </a>

      <div>
        <p class="org-promo-detail-eyebrow">Dettaglio promozione</p>
        <p>
          Controlla stato, periodo, copertura, preventivo e avanzamento della tua promozione.
        </p>
      </div>
    </header>

    <section class="org-promo-detail-state" data-promo-detail-loading>
      <div class="org-promo-detail-skeleton"></div>
      <div class="org-promo-detail-skeleton org-promo-detail-skeleton--small"></div>
    </section>

    <section class="org-promo-detail-state" data-promo-detail-error hidden>
      <h1>Promozione non trovata</h1>
      <p>Non è stato possibile caricare questa promozione.</p>
      <a href="/pages/organizer-promos-v2.html">Torna alle promozioni</a>
    </section>

    <section class="org-promo-detail-content" data-promo-detail-content hidden>
      <section class="org-promo-detail-hero" data-promo-detail-hero></section>

      <section class="org-promo-detail-grid">
        <section class="org-promo-detail-card" data-promo-detail-timeline></section>
        <section class="org-promo-detail-card" data-promo-detail-commercial></section>
        <section class="org-promo-detail-card" data-promo-detail-performance></section>
        <section class="org-promo-detail-card" data-promo-detail-event></section>
        <section class="org-promo-detail-card org-promo-detail-card--wide" data-promo-detail-notes></section>
        <section class="org-promo-detail-card org-promo-detail-card--wide" data-promo-detail-actions></section>
      </section>
    </section>
  </section>
</main>

<nav id="organizer-bottomnav"></nav>
<div id="organizer-menu"></div>

<script type="module" src="/js/organizer-shell/organizer-bootstrap.js?v=10"></script>
<script type="module" src="/js/organizer-promo-detail/organizer-promo-detail-controller.js?v=1"></script>
</body>
</html>
