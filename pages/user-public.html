<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Profilo utente • GoGoWorld.life</title>

  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#3F7C96" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="GoGoWorld" />
  <meta name="robots" content="noindex" />

  <link rel="stylesheet" href="/css/tokens.v2.css" />
  <link rel="stylesheet" href="/css/icons-v2.css" />
  <link rel="stylesheet" href="/css/areas/user-public.css" />
</head>

<body class="user-public-page">
  <main class="user-public-main" aria-label="Profilo pubblico">
    <section
      class="user-public-shell"
      id="userPublicRoot"
      aria-labelledby="userPublicTitle"
    >
      <header class="user-public-header">
        <button
          type="button"
          id="userPublicBack"
          class="user-public-back"
          aria-label="Torna alla pagina precedente"
        >
          Torna
        </button>

        <div class="user-public-header__text">
          <p id="userPublicKicker" class="user-public-kicker">Profilo pubblico</p>
          <h1 id="userPublicTitle" class="user-public-title">Utente</h1>
          <p id="userPublicHeaderMeta" class="user-public-header-meta" hidden></p>
        </div>
      </header>

      <section
        id="userPublicState"
        class="user-public-state user-public-state--info"
        aria-live="polite"
      >
        Caricamento profilo...
      </section>

      <section
        id="userPublicHero"
        class="user-public-hero"
        aria-label="Dettagli profilo"
        hidden
      >
        <div class="user-public-hero__media">
          <img
            id="userPublicAvatar"
            class="user-public-avatar"
            alt="Avatar utente"
            hidden
          />

          <div
            id="userPublicAvatarFallback"
            class="user-public-avatar-fallback"
            aria-hidden="true"
          >
            U
          </div>
        </div>

        <div class="user-public-hero__body">
          <div class="user-public-identity">
            <div class="user-public-identity__top">
              <h2 id="userPublicName" class="user-public-name">Utente</h2>
              <span
                id="userPublicRole"
                class="user-public-role"
                hidden
              ></span>
            </div>

            <p id="userPublicMeta" class="user-public-meta" hidden></p>
          </div>

          <dl class="user-public-stats" aria-label="Statistiche connessioni">
            <div class="user-public-stat">
              <dt class="user-public-stat__label">Follower</dt>
              <dd id="userPublicFollowersCount" class="user-public-stat__value">0</dd>
            </div>

            <div class="user-public-stat">
              <dt class="user-public-stat__label">Seguiti</dt>
              <dd id="userPublicFollowingCount" class="user-public-stat__value">0</dd>
            </div>
          </dl>

          <div id="userPublicActions" class="user-public-actions">
            <button
              type="button"
              id="userPublicFollowBtn"
              class="user-public-btn user-public-btn--primary"
              hidden
            >
              Segui
            </button>

            <button
              type="button"
              id="userPublicMessageBtn"
              class="user-public-btn user-public-btn--secondary"
              hidden
            >
              Messaggia
            </button>
          </div>

          <p
            id="userPublicFollowHint"
            class="user-public-follow-hint"
            hidden
          ></p>
        </div>
      </section>

      <section
        id="userPublicBioCard"
        class="user-public-card"
        aria-labelledby="userPublicBioTitle"
        hidden
      >
        <div class="user-public-card__head">
          <p class="user-public-card__kicker">Profilo</p>
          <h2 id="userPublicBioTitle" class="user-public-card__title">Bio</h2>
        </div>

        <p id="userPublicBio" class="user-public-bio">
          Nessuna bio disponibile.
        </p>
      </section>

      <section
        id="userPublicActivityCard"
        class="user-public-card"
        aria-labelledby="userPublicActivityTitle"
        hidden
      >
        <div class="user-public-card__head">
          <p class="user-public-card__kicker">Bacheca</p>
          <h2 id="userPublicActivityTitle" class="user-public-card__title">
            Attività recenti
          </h2>
        </div>

        <div
          id="userPublicActivityState"
          class="user-public-inline-state user-public-inline-state--info"
          aria-live="polite"
        >
          Caricamento attività...
        </div>

        <div
          id="userPublicActivityPrivacy"
          class="user-public-inline-state user-public-inline-state--locked"
          hidden
        >
          Questa bacheca è visibile solo ai follower.
        </div>

        <div
          id="userPublicActivityEmpty"
          class="user-public-inline-state user-public-inline-state--empty"
          hidden
        >
          Nessuna attività da mostrare.
        </div>

        <ul
          id="userPublicActivityList"
          class="user-public-activity-list"
          aria-label="Attività recenti dell'utente"
          hidden
        ></ul>
      </section>
    </section>
  </main>

  <script type="module" src="/js/user-public/user-public-controller.js"></script>
</body>
</html>
