<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home • GoGoWorld.life</title>

  <!-- BASE MINIMA -->
  <link rel="stylesheet" href="/css/tokens.v2.css" />
  <link rel="stylesheet" href="/css/icons-v2.css" />
  <!-- SOLO SE ESISTE ED È NEUTRO -->
  <!-- <link rel="stylesheet" href="/css/base.css" /> -->

  <!-- CSS SHARED SHELL -->
  <link rel="stylesheet" href="/css/shared-shell.css" />

  <!-- CSS DEDICATO HOME -->
  <link rel="stylesheet" href="/css/areas/home.css" />
</head>

<body class="home-page" data-view-id="home">
<div id="sharedTopbarMount"></div>
  <div id="sharedMenuMount"></div>

  <!-- =========================
       HOME ROOT
       ========================= -->

  <main>
    <!-- INCOLLA QUI IL TUO HTML HOME (senza topbar/nav/footer) -->
    
    <section class="home" id="homeRoot" aria-label="Home partecipante">
      <div class="home-viewport" id="homeViewport">

        <!-- =========================
             BLOCCO 1 — GENERALE
             ========================= -->
<section class="home-section">
          <header class="home-section-head">
            <div class="home-section-head__text">
              <h2 class="home-section-title">Eventi per te</h2>
              <p class="home-section-subtitle">Eventi disponibili e più vicini a te</p>
            </div>
            <div class="home-section-head__hint" aria-hidden="true">
              <span class="home-scroll-hint">Scorri</span>
            </div>
          </header>

          <div class="home-rail-shell" id="homeRailShellGeneral" data-rail-mode="active">
            <div class="home-rail home-rail--active" id="homeRailGeneralActive"></div>
            <div class="home-rail home-rail--past" id="homeRailGeneralPast"></div>

            <div class="home-scrollbar" id="homeScrollbarGeneralActive">
              <div class="home-scrollbar-thumb"></div>
            </div>

            <div class="home-scrollbar home-scrollbar--past" id="homeScrollbarGeneralPast">
              <div class="home-scrollbar-thumb"></div>
            </div>

          </div>
        </section>

        <!-- =========================
             BLOCCO 2 — PARTECIPAZIONI
             ========================= -->
        <section class="home-section">
<header class="home-section-head">
  <div class="home-section-head__text">
    <h2 class="home-section-title">I tuoi eventi</h2>
    <p class="home-section-subtitle">I tuoi eventi attivi e il tuo archivio recente</p>
  </div>
  <div class="home-section-head__hint" aria-hidden="true">
    <span class="home-scroll-hint">Scorri</span>
  </div>
</header>

          <div class="home-rail-shell" id="homeRailShellJoined" data-rail-mode="active">

            <div class="home-rail home-rail--active" id="homeRailJoinedActive"></div>
            <div class="home-rail home-rail--past" id="homeRailJoinedPast"></div>

            <div class="home-scrollbar" id="homeScrollbarJoinedActive">
              <div class="home-scrollbar-thumb"></div>
            </div>
            <div class="home-scrollbar home-scrollbar--past" id="homeScrollbarJoinedPast">
            <div class="home-scrollbar-thumb"></div>
            </div>

          </div>
        </section>

      </div>
    </section>

  </main>

  <!-- =========================
       BOTTOM NAV (MINIMA)
       ========================= -->
<nav class="home-bottomnav" aria-label="Navigazione principale">
    <a href="/pages/mappa-v2.html" class="gw-iconbtn" aria-label="Mappa" title="Mappa">
      <svg class="gw-icon" aria-hidden="true">
        <use href="#gw-icon-map"></use>
      </svg>
    </a>

    <a href="/pages/partecipante-seguiti-v2.html" class="gw-iconbtn" aria-label="Eventi seguiti" title="Eventi seguiti">
      <svg class="gw-icon" aria-hidden="true">
        <use href="#gw-icon-calendar"></use>
      </svg>
    </a>

    <a href="/pages/home-v2.html" class="gw-iconbtn is-active active" aria-label="Home" title="Home">
      <svg class="gw-icon" aria-hidden="true">
        <use href="#gw-icon-home"></use>
      </svg>
    </a>

    <a href="/pages/seguiti-utenti-v2.html" class="gw-iconbtn" aria-label="Utenti seguiti" title="Utenti seguiti">
      <svg class="gw-icon" aria-hidden="true">
        <use href="#gw-icon-users"></use>
      </svg>
    </a>

    <a href="/pages/profilo-v2.html" class="gw-iconbtn" aria-label="Profilo" title="Profilo">
      <svg class="gw-icon" aria-hidden="true">
        <use href="#gw-icon-profile"></use>
      </svg>
    </a>
  </nav>

  <!-- =========================
       INIT HOME
       ========================= -->
  <script type="module">
    import { initHome } from "/js/home/home-controller.js";

    window.addEventListener("DOMContentLoaded", () => {
      initHome(document);
    });
  </script>

</body>
</html>
