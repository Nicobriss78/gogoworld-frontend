<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Eventi seguiti • GoGoWorld.life</title>

  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="GoGoWorld" />

  <link rel="stylesheet" href="/css/tokens.v2.css" />
  <link rel="stylesheet" href="/css/icons-v2.css" />
  <link rel="stylesheet" href="/css/shared-shell.css" />
  <link rel="stylesheet" href="/css/areas/seguiti.css" />
</head>

<body class="seguiti-page" data-view-id="following">
  <div id="sharedTopbarMount"></div>
  <div id="sharedMenuMount"></div>
  <div aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden">
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
      <symbol id="gw-icon-chevron-right" viewBox="0 0 24 24">
        <path d="M9 6l6 6-6 6"></path>
      </symbol>

      <symbol id="gw-icon-refresh" viewBox="0 0 24 24">
        <path d="M20 11a8 8 0 1 0 2 5.3"></path>
        <path d="M20 4v7h-7"></path>
      </symbol>
    </svg>
  </div>  
  <main class="seguiti-main">
    <section class="seguiti-shell" id="seguitiRoot" aria-label="Eventi degli organizzatori che segui">
      <div class="seguiti-viewport" id="seguitiViewport">
        <div class="seguiti-loading" id="seguitiLoadingState" aria-live="polite">
          <div class="seguiti-loading__panel">
            <div class="seguiti-loading__head"></div>
            <div class="seguiti-loading__subhead"></div>

            <div class="seguiti-loading__rail">
              <div class="seguiti-loading__card"></div>
              <div class="seguiti-loading__card"></div>
              <div class="seguiti-loading__card"></div>
            </div>

            <div class="seguiti-loading__scrollbar"></div>
          </div>
        </div>

        <div class="seguiti-sections" id="seguitiSections" hidden aria-live="polite"></div>

        <div class="seguiti-state seguiti-state--empty-global" id="seguitiEmptyState" hidden role="status" aria-live="polite">
          <h2 class="seguiti-state__title">Non segui ancora nessun organizzatore</h2>
          <p class="seguiti-state__text">
            Non segui ancora nessun organizzatore, cercalo oppure dai un'occhiata agli eventi in Home.
            Decidi chi seguire per rimanere sempre aggiornato sui migliori eventi!
          </p>
        </div>

        <div class="seguiti-state seguiti-state--error" id="seguitiErrorState" hidden role="alert" aria-live="assertive">
          <h2 class="seguiti-state__title">Non è stato possibile caricare gli eventi seguiti</h2>
          <p class="seguiti-state__text" id="seguitiErrorText">Riprova tra poco.</p>
          <button class="seguiti-state__action" type="button" id="seguitiRetryBtn">
            <svg class="gw-icon" aria-hidden="true"><use href="#gw-icon-refresh"></use></svg>
            <span>Riprova</span>
          </button>
        </div>
      </div>
    </section>
  </main>

  <div id="sharedBottomnavMount"></div>

  <template id="seguitiOrganizerSectionTemplate">
    <section class="seguiti-organizer-section" data-organizer-id="" data-rail-mode="active" aria-label="">
      <header class="seguiti-organizer-head">
        <div class="seguiti-organizer-head__text">
          <h2 class="seguiti-organizer-title"></h2>
          <p class="seguiti-organizer-subtitle">Eventi attivi e archivio recente</p>
        </div>

        <div class="seguiti-organizer-head__hint" aria-hidden="true">
          <span class="seguiti-scroll-hint">Scorri</span>
        </div>
      </header>

      <div class="seguiti-rail-shell">
  <div class="seguiti-rail seguiti-rail--active" data-rail="active" aria-label="Eventi attivi"></div>

  <div class="seguiti-rail seguiti-rail--past" data-rail="past" aria-label="Eventi passati" hidden></div>

  <div class="seguiti-scrollbar" data-scrollbar="active">
    <div class="seguiti-scrollbar-thumb"></div>
  </div>

  <div class="seguiti-scrollbar seguiti-scrollbar--past" data-scrollbar="past" hidden>
    <div class="seguiti-scrollbar-thumb"></div>
  </div>

  <div class="seguiti-rail-empty" data-empty="active" hidden>
    <p class="seguiti-rail-empty__text">Nessun evento attivo disponibile.</p>
  </div>

  <div class="seguiti-rail-empty" data-empty="past" hidden>
    <p class="seguiti-rail-empty__text">Nessun evento passato disponibile.</p>
  </div>
</div>
    </section>
  </template>

  <template id="seguitiCardTemplate">
    <article class="seguiti-card" data-event-id="">
      <button class="seguiti-card__surface" type="button" data-action="open-detail">
        <div class="seguiti-card__thumb-wrap">
          <img class="seguiti-card__thumb" src="" alt="" loading="lazy" />
          <span class="seguiti-card__status-badge"></span>
        </div>

        <div class="seguiti-card__content">
          <h3 class="seguiti-card__title"></h3>

          <div class="seguiti-card__meta">
            <div class="seguiti-card__meta-row">
              <span class="seguiti-card__meta-label">Luogo</span>
              <span class="seguiti-card__meta-value" data-field="place"></span>
            </div>

            <div class="seguiti-card__meta-row">
              <span class="seguiti-card__meta-label">Data</span>
              <span class="seguiti-card__meta-value" data-field="date"></span>
            </div>

            <div class="seguiti-card__meta-row">
              <span class="seguiti-card__meta-label">Categoria</span>
              <span class="seguiti-card__meta-value" data-field="category"></span>
            </div>
          </div>

          <div class="seguiti-card__price"></div>
        </div>
      </button>

      <button class="seguiti-card__action-btn" type="button" data-action="join-event">
        Partecipa
      </button>
    </article>
  </template>

  <script type="module">
    import { initSharedShell } from "/js/shared-shell/shared-bootstrap.js";
    import { initSeguitiController } from "/js/seguiti/seguiti-controller.js";

    window.addEventListener("DOMContentLoaded", () => {
      initSharedShell();
      initSeguitiController(document);
    });
  </script>
</body>
            </html>
