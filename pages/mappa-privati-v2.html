<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mappa eventi privati • GoGoWorld.life</title>

<!-- V2 STACK -->
<link rel="stylesheet" href="/css/tokens.v2.css" />
<link rel="stylesheet" href="/css/icons-v2.css" />

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />

  <!-- Area -->
  <link rel="stylesheet" href="/css/areas/mappa-privati.css" />
</head>
<body class="mappa-page">
   <div aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden">
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="gw-icon-search" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7"></circle>
      <path d="M20 20l-3.5-3.5"></path>
    </symbol>

      <symbol id="gw-icon-pin" viewBox="0 0 24 24">
       <path d="M12 21s7-5.2 7-11a7 7 0 0 0-14 0c0 5.8 7 11 7 11z"></path>
       <circle cx="12" cy="10" r="2.5"></circle>
      </symbol>

      <symbol id="gw-icon-chat" viewBox="0 0 24 24">
        <path d="M21 12c0 4.4-4 8-9 8-1.2 0-2.3-.2-3.3-.6L3 21l1.7-4.2A7.4 7.4 0 0 1 3 12c0-4.4 4-8 9-8s9 3.6 9 8z"></path>
        <path d="M8 12h.01M12 12h.01M16 12h.01"></path>
     </symbol>

      <symbol id="gw-icon-bell" viewBox="0 0 24 24">
        <path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7z"></path>
        <path d="M10 19a2 2 0 0 0 4 0"></path>
      </symbol>

      <symbol id="gw-icon-menu" viewBox="0 0 24 24">
        <path d="M4 6h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 18h16"></path>
     </symbol>

      <symbol id="gw-icon-map" viewBox="0 0 24 24">
        <path d="M3 6l6-2 6 2 6-2v14l-6 2-6-2-6 2V6z"></path>
        <path d="M9 4v14"></path>
        <path d="M15 6v14"></path>
      </symbol>

      <symbol id="gw-icon-calendar" viewBox="0 0 24 24">
        <rect x="3" y="5" width="18" height="16" rx="2"></rect>
        <path d="M16 3v4"></path>
        <path d="M8 3v4"></path>
        <path d="M3 10h18"></path>
      </symbol>

      <symbol id="gw-icon-home" viewBox="0 0 24 24">
        <path d="M4 10.5L12 4l8 6.5"></path>
        <path d="M6 9.5V20h12V9.5"></path>
      </symbol>

      <symbol id="gw-icon-users" viewBox="0 0 24 24">
        <circle cx="9" cy="9" r="3"></circle>
        <circle cx="17" cy="10" r="2.5"></circle>
        <path d="M4.5 19a4.5 4.5 0 0 1 9 0"></path>
        <path d="M14.5 18a3.5 3.5 0 0 1 5 0"></path>
      </symbol>

      <symbol id="gw-icon-profile" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="3.5"></circle>
        <path d="M5 20a7 7 0 0 1 14 0"></path>
      </symbol>
    </svg>
  </div>
<header class="mappa-topbar">
  <!-- Riga 1 -->
  <div class="mappa-topbar__row mappa-topbar__row--identity">
    <div class="mappa-topbar__identity">
      <div id="mappaGreeting" class="mappa-topbar__greeting">Ciao</div>
      <div id="mappaRole" class="mappa-topbar__role">...</div>
    </div>

    <div class="mappa-topbar__brand">
      GoGoWorld.life
    </div>
  </div>

  <!-- Riga 2 -->
  <div class="mappa-topbar__row mappa-topbar__row--actions">
    <div class="mappa-topbar__actions">
  <button class="gw-iconbtn">
    <svg class="gw-icon" aria-hidden="true">
      <use href="#gw-icon-search"></use>
    </svg>
  </button>

  <button class="gw-iconbtn">
    <svg class="gw-icon" aria-hidden="true">
      <use href="#gw-icon-pin"></use>
    </svg>
  </button>

  <button class="gw-iconbtn">
    <svg class="gw-icon" aria-hidden="true">
      <use href="#gw-icon-chat"></use>
    </svg>
  </button>

  <button class="gw-iconbtn">
    <svg class="gw-icon" aria-hidden="true">
      <use href="#gw-icon-bell"></use>
    </svg>
  </button>

  <button class="gw-iconbtn">
    <svg class="gw-icon" aria-hidden="true">
      <use href="#gw-icon-menu"></use>
    </svg>
  </button>
</div>
  </div>
</header>

  <main class="mappa-main" aria-label="Scheda mappa eventi">
    <!-- BLOCCO MAPPA -->
    <section id="mappaMapSection" class="mappa-section" aria-labelledby="mappaTitle">
      <div class="mappa-header">
        <h1 id="mappaTitle" class="mappa-title">Mappa eventi</h1>
      </div>

      <div class="mappa-card">
        <div id="mappaMapViewport" class="mappa-viewport">
          <div
            id="mappaMap"
            class="mappa-map"
            role="region"
            aria-label="Mappa degli eventi pubblici"
          ></div>
        </div>

        <div id="mappaLegend" class="mappa-legend" aria-label="Legenda stati evento">
          <div class="mappa-legend-item">
            <span class="mappa-dot mappa-dot--ongoing" aria-hidden="true"></span>
            <span>In corso</span>
          </div>

          <div class="mappa-legend-item">
            <span class="mappa-dot mappa-dot--imminent" aria-hidden="true"></span>
            <span>Imminente</span>
          </div>

          <div class="mappa-legend-item">
            <span class="mappa-dot mappa-dot--future" aria-hidden="true"></span>
            <span>In arrivo</span>
          </div>
        </div>
      </div>
    </section>

    <!-- DRAWER DETTAGLIO PRIMO LIVELLO -->
    <div
      id="mappaDetailOverlay"
      class="mappa-detail-overlay"
      hidden
      aria-hidden="true"
    ></div>

    <aside
      id="mappaDetailDrawer"
      class="mappa-detail-drawer"
      hidden
      aria-hidden="true"
      aria-labelledby="mappaDetailTitle"
    >
      <div class="mappa-detail-header">
        <div id="mappaDetailTitle" class="mappa-detail-title">Evento selezionato</div>

        <button
          id="mappaDetailClose"
          type="button"
          class="gw-iconbtn mappa-detail-close"
          data-action="close-detail"
          aria-label="Chiudi dettaglio evento"
          title="Chiudi"
        >
          <span aria-hidden="true">×</span>
        </button>
      </div>

      <div id="mappaDetailContent" class="mappa-detail-content">
        <!-- Render dinamico -->
      </div>
    </aside>

    <!-- BLOCCO CHAT -->
    <section
      id="mappaChatSection"
      class="mappa-chat-section"
      aria-labelledby="mappaChatHeading"
    >
      <div class="mappa-chat-card">
        <div class="mappa-chat-headerbar">
          <h2 id="mappaChatHeading" class="mappa-chat-heading">Chat evento</h2>

          <button
            id="mappaChatInfoBtn"
            type="button"
            class="gw-iconbtn"
            data-action="open-detail"
            aria-label="Apri dettaglio evento selezionato"
            title="Dettaglio evento"
            disabled
          >
            <span aria-hidden="true">i</span>
          </button>
        </div>

        <div
          id="mappaChatHeader"
          class="mappa-chat-header"
          aria-live="polite"
        >
          Chat evento
        </div>

        <div
          id="mappaChatNotice"
          class="mappa-chat-notice"
          aria-live="polite"
        >
          Seleziona un evento dalla mappa per attivare la chat.
        </div>

        <div
          id="mappaChatMessages"
          class="mappa-chat-messages"
          aria-live="polite"
          aria-label="Messaggi della chat evento"
        >
          <!-- Render dinamico -->
        </div>

        <div id="mappaChatComposer" class="mappa-chat-composer">
          <label for="mappaChatInput" class="sr-only">Scrivi un messaggio</label>
          <input
            id="mappaChatInput"
            type="text"
            maxlength="1000"
            placeholder="Scrivi un messaggio..."
            autocomplete="off"
            disabled
          />

          <button
            id="mappaChatSend"
            type="button"
            class="gw-btn-primary"
            data-action="send-message"
            disabled
          >
            Invia
          </button>
        </div>
      </div>
    </section>
  </main>

  <!-- BOTTOM NAV V2 -->
<nav class="mappa-bottomnav" aria-label="Navigazione principale">
  <a href="/pages/mappa-v2.html" class="gw-iconbtn is-active mappa-bottomnav__item" aria-label="Mappa" title="Mappa">
    <svg class="gw-icon" aria-hidden="true">
      <use href="#gw-icon-map"></use>
    </svg>
  </a>

  <a href="/pages/partecipante-seguiti-v2.html" class="gw-iconbtn mappa-bottomnav__item" aria-label="Eventi seguiti" title="Eventi seguiti">
    <svg class="gw-icon" aria-hidden="true">
      <use href="#gw-icon-calendar"></use>
    </svg>
  </a>

  <a href="/pages/home-v2.html" class="gw-iconbtn mappa-bottomnav__item" aria-label="Home" title="Home">
    <svg class="gw-icon" aria-hidden="true">
      <use href="#gw-icon-home"></use>
    </svg>
  </a>

  <a href="/partecipante-seguiti-utenti.html" class="gw-iconbtn mappa-bottomnav__item" aria-label="Utenti seguiti" title="Utenti seguiti">
    <svg class="gw-icon" aria-hidden="true">
      <use href="#gw-icon-users"></use>
    </svg>
  </a>

  <a href="/profile.html" class="gw-iconbtn mappa-bottomnav__item" aria-label="Profilo" title="Profilo">
    <svg class="gw-icon" aria-hidden="true">
      <use href="#gw-icon-profile"></use>
    </svg>
  </a>
</nav>

  <!-- Leaflet -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Controller -->
  <script type="module" src="/js/mappa/mappa-controller.js"></script>
</body>
  </html>
