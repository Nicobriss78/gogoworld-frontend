<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mappa eventi • GoGoWorld.life</title>

<!-- V2 STACK -->
<link rel="stylesheet" href="/css/tokens.v2.css" />
<link rel="stylesheet" href="/css/icons-v2.css" />
<link rel="stylesheet" href="/css/shared-shell.css" />

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />

  <!-- Area -->
  <link rel="stylesheet" href="/css/areas/mappa-privati.css" />
</head>
<body class="mappa-page" data-view-id="private-map">  <div id="sharedMenuMount"></div>

  <main class="mappa-main" aria-label="Scheda mappa eventi">
    <!-- BLOCCO MAPPA -->
    <section id="mappaMapSection" class="mappa-section" aria-labelledby="mappaTitle">
      <div class="mappa-header">
        <h1 id="mappaTitle" class="mappa-title">Mappa eventi</h1>

        <button
          id="mappaLocateBtn"
          type="button"
          class="mappa-locate-btn"
          data-state="idle"
          aria-label="Trova eventi vicino a me"
          title="Vicino a me"
        >
          <span class="mappa-locate-btn__icon" aria-hidden="true">
            <svg
              class="mappa-target-icon"
              viewBox="0 0 24 24"
              focusable="false"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="9" class="mappa-target-icon__outer"></circle>
              <circle cx="12" cy="12" r="5.5" class="mappa-target-icon__middle"></circle>
              <circle cx="12" cy="12" r="2.5" class="mappa-target-icon__inner"></circle>
            </svg>
          </span>

          <span id="mappaLocateBtnLabel" class="mappa-locate-btn__label">
            Vicino a me
          </span>
        </button>
        <div
          id="mappaGeoStatus"
          class="mappa-geo-status"
          aria-live="polite"
        ></div>
      </div>

      <div class="mappa-card">
        <div id="mappaMapViewport" class="mappa-viewport">
          <div
            id="mappaMap"
            class="mappa-map"
            role="region"
            aria-label="Mappa degli eventi pubblici"
          ></div>
        </div>

        <div id="mappaLegend" class="mappa-legend" aria-label="Legenda stati evento">
          <div class="mappa-legend-item">
            <span class="mappa-dot mappa-dot--ongoing" aria-hidden="true"></span>
            <span>In corso</span>
          </div>

          <div class="mappa-legend-item">
            <span class="mappa-dot mappa-dot--imminent" aria-hidden="true"></span>
            <span>Imminente</span>
          </div>

          <div class="mappa-legend-item">
            <span class="mappa-dot mappa-dot--future" aria-hidden="true"></span>
            <span>In arrivo</span>
          </div>
        </div>
      </div>
    </section>

    <!-- DRAWER DETTAGLIO PRIMO LIVELLO -->
    <div
      id="mappaDetailOverlay"
      class="mappa-detail-overlay"
      hidden
      aria-hidden="true"
    ></div>

    <aside
      id="mappaDetailDrawer"
      class="mappa-detail-drawer"
      hidden
      aria-hidden="true"
      aria-labelledby="mappaDetailTitle"
    >
      <div class="mappa-detail-header">
        <div id="mappaDetailTitle" class="mappa-detail-title">Evento selezionato</div>

        <button
          id="mappaDetailClose"
          type="button"
          class="gw-iconbtn mappa-detail-close"
          data-action="close-detail"
          aria-label="Chiudi dettaglio evento"
          title="Chiudi"
        >
          <span aria-hidden="true">×</span>
        </button>
      </div>

      <div id="mappaDetailContent" class="mappa-detail-content">
        <!-- Render dinamico -->
      </div>
    </aside>

    <!-- BLOCCO CHAT -->
    <section
      id="mappaChatSection"
      class="mappa-chat-section"
      aria-labelledby="mappaChatHeading"
    >
      <div class="mappa-chat-card">
        <div class="mappa-chat-headerbar">
          <h2 id="mappaChatHeading" class="mappa-chat-heading">Chat evento</h2>

          <button
            id="mappaChatInfoBtn"
            type="button"
            class="mappa-chat-goevent-btn"
            data-action="open-detail"
            aria-label="Vai all’evento"
            title="Vai all’evento"
            disabled
          >
            Vai all’evento
          </button>
        </div>

        <div
          id="mappaChatHeader"
          class="mappa-chat-header"
          aria-live="polite"
        >
          Chat evento
        </div>

        <div
          id="mappaChatNotice"
          class="mappa-chat-notice"
          aria-live="polite"
        >
          Seleziona un evento dalla mappa per attivare la chat.
        </div>

        <div
          id="mappaChatMessages"
          class="mappa-chat-messages"
          aria-live="polite"
          aria-label="Messaggi della chat evento"
        >
          <!-- Render dinamico -->
        </div>

        <div id="mappaChatComposer" class="mappa-chat-composer">
          <label for="mappaChatInput" class="sr-only">Scrivi un messaggio</label>
          <input
            id="mappaChatInput"
            type="text"
            maxlength="1000"
            placeholder="Scrivi un messaggio..."
            autocomplete="off"
            disabled
          />

          <button
            id="mappaChatSend"
            type="button"
            class="gw-btn-primary"
            data-action="send-message"
            disabled
          >
            Invia
          </button>
        </div>
      </div>
    </section>
  </main>
<div id="sharedBottomnavMount"></div>

  <!-- Leaflet -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script type="module">
    import { initSharedShell } from "/js/shared-shell/shared-bootstrap.js";

    window.addEventListener("DOMContentLoaded", () => {
      initSharedShell();
    });
  </script>

  <!-- Controller -->
  <script type="module" src="/js/mappa-privati/mappa-privati-controller.js"></script>
</body>
</html>
