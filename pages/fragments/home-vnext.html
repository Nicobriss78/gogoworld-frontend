<!-- HOME MODULE — GoGoWorld.life -->
<main class="home-page" id="homePage">

  <!-- Topbar shared -->
  <header class="gw-topbar" id="gwTopbar">
    <!-- topbar shared già gestita altrove -->
  </header>

  <!-- HOME -->
  <section class="home" id="homeRoot" aria-label="Home partecipante">

    <div class="home-viewport" id="homeViewport">

      <!-- SEZIONE 1 — EVENTI GENERALI -->
      <section
        class="home-section home-section--general"
        id="homeSectionGeneral"
        aria-labelledby="homeSectionGeneralTitle"
        data-home-section="general"
      >
        <header class="home-section-head">
          <div class="home-section-head__text">
            <h2 class="home-section-title" id="homeSectionGeneralTitle">
              Eventi generali
            </h2>
            <p class="home-section-subtitle">
              Eventi disponibili e più vicini a te
            </p>
          </div>

          <div class="home-section-head__hint" aria-hidden="true">
            <span class="home-scroll-hint">Scorri</span>
          </div>
        </header>

        <div
          class="home-rail-shell"
          id="homeRailShellGeneral"
          data-rail-shell="general"
          data-rail-mode="active"
        >
          <div
            class="home-rail home-rail--active"
            id="homeRailGeneralActive"
            data-rail="general-active"
            aria-label="Eventi generali attivi"
          >
            <!-- popolato da JS -->
          </div>

          <div
            class="home-rail home-rail--past is-hidden"
            id="homeRailGeneralPast"
            data-rail="general-past"
            aria-label="Eventi generali passati"
          >
            <!-- popolato da JS -->
          </div>

          <div
            class="home-scrollbar"
            id="homeScrollbarGeneralActive"
            data-scrollbar="general-active"
            aria-hidden="true"
          >
            <div class="home-scrollbar-thumb"></div>
          </div>

          <div
            class="home-scrollbar home-scrollbar--past is-hidden"
            id="homeScrollbarGeneralPast"
            data-scrollbar="general-past"
            aria-hidden="true"
          >
            <div class="home-scrollbar-thumb"></div>
          </div>
        </div>
      </section>

      <!-- SEZIONE 2 — EVENTI A CUI PARTECIPO -->
      <section
        class="home-section home-section--joined"
        id="homeSectionJoined"
        aria-labelledby="homeSectionJoinedTitle"
        data-home-section="joined"
      >
        <header class="home-section-head">
          <div class="home-section-head__text">
            <h2 class="home-section-title" id="homeSectionJoinedTitle">
              Eventi a cui partecipo
            </h2>
            <p class="home-section-subtitle">
              I tuoi eventi attivi e il tuo archivio recente
            </p>
          </div>

          <div class="home-section-head__hint" aria-hidden="true">
            <span class="home-scroll-hint">Scorri</span>
          </div>
        </header>

        <div
          class="home-rail-shell"
          id="homeRailShellJoined"
          data-rail-shell="joined"
          data-rail-mode="active"
        >
          <div
            class="home-rail home-rail--active"
            id="homeRailJoinedActive"
            data-rail="joined-active"
            aria-label="Eventi a cui partecipo attivi"
          >
            <!-- popolato da JS -->
          </div>

          <div
            class="home-rail home-rail--past is-hidden"
            id="homeRailJoinedPast"
            data-rail="joined-past"
            aria-label="Eventi a cui partecipo passati"
          >
            <!-- popolato da JS -->
          </div>

          <div
            class="home-scrollbar"
            id="homeScrollbarJoinedActive"
            data-scrollbar="joined-active"
            aria-hidden="true"
          >
            <div class="home-scrollbar-thumb"></div>
          </div>

          <div
            class="home-scrollbar home-scrollbar--past is-hidden"
            id="homeScrollbarJoinedPast"
            data-scrollbar="joined-past"
            aria-hidden="true"
          >
            <div class="home-scrollbar-thumb"></div>
          </div>
        </div>
      </section>

    </div>
  </section>

  <!-- Bottomnav shared -->
  <nav class="gw-bottomnav" id="gwBottomnav" aria-label="Navigazione principale">
    <!-- bottomnav shared già gestita altrove -->
  </nav>

  <!-- Footer shared -->
  <footer class="app-footer" id="appFooter">
    <!-- footer shared già gestito altrove -->
  </footer>

</main>
