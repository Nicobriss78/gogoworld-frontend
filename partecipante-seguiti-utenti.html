<!DOCTYPE html>
<html lang="it">
<meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GoGoWorld.life – Utenti seguiti</title>

  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#1F4E5F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="GoGoWorld" />

  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/areas/participant.css" />
</head>


<body>
  <div class="gw-app">
    <div class="gw-page">
      <!-- =========================
           ANCHOR: TOPBAR
           ========================= -->
      <header class="gw-topbar">
        <div class="gw-topbar-row gw-topbar-row--title">
          <div class="gw-greeting">
            <div class="gw-hello">Ciao <span id="gwUserName">Utente</span></div>
            <div class="gw-status" id="gwUserStatus">Partecipante</div>
          </div>

          <div class="gw-brand">
            <span class="gw-brandtext">GoGoWorld.life</span>
          </div>
        </div>

        <div class="gw-topbar-row gw-topbar-row--actions">
          <a class="gw-iconbtn" href="pages/cerca-utenti.html" title="Cerca" aria-label="Cerca">
            <svg class="gw-icon" aria-hidden="true"><use href="#gw-icon-search"></use></svg>
          </a>

          <button class="gw-iconbtn" id="btnGeo" title="Posizione" aria-label="Posizione">
            <svg class="gw-icon" aria-hidden="true"><use href="#gw-icon-pin"></use></svg>
          </button>

          <a class="gw-iconbtn" href="messages.html" title="Messaggi" aria-label="Messaggi">
            <svg class="gw-icon" aria-hidden="true"><use href="#gw-icon-chat"></use></svg>
            <span id="messagesBadge" class="gw-badge is-hidden">0</span>
          </a>

          <button class="gw-iconbtn" id="btnNotifications" title="Notifiche" aria-label="Notifiche">
            <svg class="gw-icon" aria-hidden="true"><use href="#gw-icon-bell"></use></svg>
            <span id="notiBadge" class="gw-badge is-hidden">0</span>
          </button>

          <button class="gw-iconbtn" id="btnHamburger" title="Menu" aria-label="Menu">
            <svg class="gw-icon" aria-hidden="true"><use href="#gw-icon-menu"></use></svg>
          </button>
        </div>

        <div id="gwMenu" class="gw-menu is-hidden">
          <a href="pages/cerca-utenti.html">Cerca utente</a>
          <a href="#" id="btnPrivateEvents">Eventi privati</a>
          <a href="#" id="btnGuide">Guida partecipante</a>
          <a href="#" id="btnSwitchRole">Cambia ruolo</a>
          <a href="#" id="btnLogout" class="danger">Logout</a>
        </div>
      </header>

      <!-- =========================
           ANCHOR: FOLLOWING_USERS_MAIN
           ========================= -->
      <main class="gw-home">
        <section class="gw-block gw-block--fixed">
          <div class="gw-block-head">
            <h2 class="gw-block-title">Utenti che segui</h2>
          </div>

          <div class="gw-block-body">
            <!-- render lista -->
            <div id="followingUsersContainer"></div>
          </div>
        </section>

        <!-- =========================
             ANCHOR: BOTTOMNAV
             ========================= -->
        <footer class="app-footer">
          GoGoWorld.life – Area Partecipante
        </footer>
        <nav class="gw-bottomnav">
  <a class="gw-navitem" href="partecipante-mappa.html" title="Mappa" aria-label="Mappa">
    <svg class="gw-icon" aria-hidden="true"><use href="#gw-icon-map"></use></svg>
  </a>

  <a class="gw-navitem" href="partecipante-seguiti-eventi.html" title="Eventi seguiti" aria-label="Eventi seguiti">
    <svg class="gw-icon" aria-hidden="true"><use href="#gw-icon-calendar"></use></svg>
  </a>

  <a class="gw-navitem gw-navitem--home" href="partecipante.html" title="Home" aria-label="Home">
    <svg class="gw-icon" aria-hidden="true"><use href="#gw-icon-home"></use></svg>
  </a>

  <a class="gw-navitem is-active" href="partecipante-seguiti-utenti.html" title="Utenti seguiti" aria-label="Utenti seguiti">
    <svg class="gw-icon" aria-hidden="true"><use href="#gw-icon-users"></use></svg>
  </a>

  <a class="gw-navitem" href="profile.html" title="Profilo" aria-label="Profilo">
    <svg class="gw-icon" aria-hidden="true"><use href="#gw-icon-profile"></use></svg>
  </a>
</nav>
      </main>

      <!-- =========================
           ANCHOR: SCRIPTS
           ========================= -->
      <script type="module">
        import { initSharedTopbarUI } from "./js/shared-ui.js";
        initSharedTopbarUI();
      </script>

      <script type="module" src="js/partecipante-seguiti-utenti.js"></script>
      <script type="module" src="js/notifications.js"></script>

    </div>
  </div>
</body>
</html>
