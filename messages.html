<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Messaggi</title>

  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#1F4E5F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="GoGoWorld" />

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="/css/areas/public.css" />
</head>

<body>
  <header>
    <h1>Messaggi</h1>
    <nav class="toolbar">
    <a id="backLink" href="partecipante.html" class="btn btn-secondary">← Torna</a>
    </nav>
  </header>

  <main id="messagesApp">
    <section id="threadsPanel">
      <h2>Conversazioni</h2>
      <div id="threadsList" class="scrollable"></div>
    </section>

    <section id="chatPanel">
      <div id="chatHeader">
        <h2 id="chatUser"></h2>
      </div>
      <div id="chatMessages" class="scrollable"></div>
      <div id="chatInput">
        <textarea id="msgText" rows="2" placeholder="Scrivi un messaggio..."></textarea>
        <button id="sendBtn" class="btn">Invia</button>
      </div>
    </section>
  </main>

  <script type="module" src="js/messages.js"></script>
  <script>
  // PATCH A4 – gestione ritorno dinamico
  (function () {
    const params = new URLSearchParams(location.search);
    const rt = params.get("returnTo");
    if (rt) {
      const back = document.getElementById("backLink");
      if (back) back.href = decodeURIComponent(rt);
    }
  })();
</script>

</body>
</html>
